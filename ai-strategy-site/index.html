<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Market Strategy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;
  --border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.14);
  --text:#e5e5e5;--text-muted:#a0a0a0;--text-faint:#666;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.15);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);
  --orange:#f97316;--orange-dim:rgba(249,115,22,0.12);
  --indigo:#6366f1;--indigo-dim:rgba(99,102,241,0.12);
  --radius:6px;--radius-lg:10px;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:var(--accent);text-decoration:none}
.tabular{font-variant-numeric:tabular-nums lining-nums}

/* Layout */
.app{display:flex;flex-direction:column;height:100dvh}
.topbar{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);z-index:20;overflow-x:auto}
.logo{font-weight:700;font-size:14px;letter-spacing:-0.02em;white-space:nowrap;color:var(--text);display:flex;align-items:center;gap:8px}
.logo svg{flex-shrink:0}
.nav{display:flex;gap:2px;margin-left:24px}
.nav button{background:none;border:none;color:var(--text-muted);font:500 13px/1 'Inter',sans-serif;padding:8px 14px;border-radius:var(--radius);cursor:pointer;white-space:nowrap;transition:all 180ms var(--ease)}
.nav button:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav button.active{color:var(--text);background:var(--accent-dim)}
.nav button:active{transform:scale(0.97)}
.main{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:24px}
@media(max-width:768px){
  .topbar{padding:0 12px;height:auto;min-height:48px;flex-wrap:wrap;gap:8px;padding-top:8px;padding-bottom:8px}
  .nav{margin-left:0;overflow-x:auto;width:100%}
  .main{padding:16px}
}

/* Tabs */
.tab{display:none;max-width:1200px;margin:0 auto;width:100%}
.tab.active{display:block}

/* KPI Cards */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(200px,100%),1fr));gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px}
.kpi-label{font-size:12px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-0.02em}

/* Tables */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:1}
th{background:var(--surface2);text-align:left;padding:10px 14px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.cat-badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--accent-dim);color:var(--accent)}
.cat-badge.etf{background:var(--green-dim);color:var(--green)}
.cat-badge.bench{background:rgba(255,255,255,0.06);color:var(--text-muted)}
.cat-badge.newer{background:var(--amber-dim);color:var(--amber)}
.negative{color:var(--red)}
.positive{color:var(--green)}

/* Insight box */
.insight{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-lg);padding:16px 20px;margin-top:20px;font-size:13px;line-height:1.6;color:var(--text-muted)}

/* Bar indicators */
.bar-cell{position:relative;min-width:120px}
.bar-bg{position:absolute;left:0;top:50%;transform:translateY(-50%);height:22px;border-radius:3px;opacity:0.25}
.bar-val{position:relative;z-index:1}

/* Scenario Tab */
.scenario-controls{display:flex;flex-wrap:wrap;gap:24px;margin-bottom:24px}
.control-group label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);margin-bottom:8px}
.btn-group{display:flex;gap:4px;flex-wrap:wrap}
.btn-group button{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font:500 13px/1 'Inter',sans-serif;padding:8px 16px;border-radius:var(--radius);cursor:pointer;transition:all 180ms var(--ease)}
.btn-group button:hover{border-color:var(--border-hover);color:var(--text)}
.btn-group button.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.btn-group button:active{transform:scale(0.97)}
.outcome-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(260px,100%),1fr));gap:12px;margin-top:20px}
.outcome-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;text-align:center}
.outcome-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);margin-bottom:8px}
.outcome-card .value{font-size:28px;font-weight:700;letter-spacing:-0.02em}
.outcome-card .sub{font-size:12px;color:var(--text-muted);margin-top:6px}
.outcome-card.highlight{border-color:var(--accent)}
.outcome-card.highlight .value{color:var(--accent)}
.outcome-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr));gap:12px;margin-top:16px}
.meta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px}
.meta-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);margin-bottom:4px}
.meta-card .value{font-size:16px;font-weight:600}
.scenario-note{font-size:12px;color:var(--text-faint);margin-top:4px}

/* Portfolio Tab */
.profile-tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.profile-tabs button{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font:500 13px/1 'Inter',sans-serif;padding:10px 18px;border-radius:var(--radius);cursor:pointer;transition:all 180ms var(--ease);position:relative}
.profile-tabs button:hover{border-color:var(--border-hover);color:var(--text)}
.profile-tabs button.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.profile-tabs button:active{transform:scale(0.97)}
.rec-badge{position:absolute;top:-6px;right:-6px;font-size:9px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:10px;font-weight:600}
.port-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start}
@media(max-width:768px){.port-layout{grid-template-columns:1fr}}
.donut-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;display:flex;flex-direction:column;align-items:center}
.donut-wrap canvas{max-width:200px;max-height:200px}
.donut-legend{margin-top:16px;width:100%}
.donut-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0}
.donut-legend-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Exit Rules */
.rule-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.rule-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.priority-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:3px 8px;border-radius:4px}
.priority-badge.high{background:var(--red-dim);color:var(--red)}
.priority-badge.medium{background:var(--amber-dim);color:var(--amber)}
.rule-name{font-weight:600;font-size:14px}
.rule-body{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;color:var(--text-muted)}
.rule-body dt{font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-faint);margin-bottom:2px}
@media(max-width:600px){.rule-body{grid-template-columns:1fr}}

/* My Portfolio */
.mp-cat-bar{display:flex;height:28px;border-radius:var(--radius);overflow:hidden;margin-bottom:24px;gap:2px}
.mp-cat-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;padding:0 8px;min-width:40px}
.mp-section-title{font-size:15px;font-weight:700;margin-bottom:14px;margin-top:28px;letter-spacing:-0.01em}
.mp-section-title:first-child{margin-top:0}
.verdict-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.verdict-badge.sb{background:var(--green-dim);color:var(--green)}
.verdict-badge.buy{background:var(--accent-dim);color:var(--accent)}
.verdict-badge.hold{background:var(--amber-dim);color:var(--amber)}
.verdict-badge.sell{background:var(--red-dim);color:var(--red)}
.verdict-badge.trim{background:var(--orange-dim);color:var(--orange)}
.verdict-badge.exit{background:var(--red-dim);color:var(--red)}
.verdict-badge.na{background:rgba(255,255,255,0.06);color:var(--text-muted)}
.sizing-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.03em}
.sizing-badge.uw{background:var(--indigo-dim);color:var(--indigo)}
.sizing-badge.correct{background:rgba(255,255,255,0.06);color:var(--text-muted)}
.sizing-badge.ow{background:var(--red-dim);color:var(--red)}
.alert-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;font-size:13px;line-height:1.5;color:var(--text-muted)}
.alert-card .alert-sev{flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:3px 8px;border-radius:4px}
.alert-card .alert-sev.high{background:var(--red-dim);color:var(--red)}
.alert-card .alert-sev.medium{background:var(--amber-dim);color:var(--amber)}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;font-size:13px;line-height:1.5}
.action-card .act-icon{flex-shrink:0;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.action-card .act-icon.trim{background:var(--amber-dim);color:var(--amber)}
.action-card .act-icon.exit{background:var(--red-dim);color:var(--red)}
.action-card .act-icon.hold{background:var(--green-dim);color:var(--green)}
.action-card .act-icon.add{background:var(--accent-dim);color:var(--accent)}
.action-card .act-title{font-weight:600;color:var(--text);margin-bottom:2px}
.action-card .act-desc{color:var(--text-muted)}
.mp-sim-controls{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px}
.mp-sim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(200px,100%),1fr));gap:12px}
.mp-sim-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;text-align:center}
.mp-sim-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);margin-bottom:6px}
.mp-sim-card .value{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.mp-sim-card .sub{font-size:11px;color:var(--text-muted);margin-top:4px}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(340px,100%),1fr));gap:10px}

/* 10-Year Forecast Tab */
.fc-chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px;position:relative}
.fc-chart-wrap canvas{width:100%!important;height:340px!important}
.fc-scenario-btns{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.fc-scenario-btns button{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font:500 13px/1 'Inter',sans-serif;padding:10px 18px;border-radius:var(--radius);cursor:pointer;transition:all 180ms var(--ease)}
.fc-scenario-btns button:hover{border-color:var(--border-hover);color:var(--text)}
.fc-scenario-btns button.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.fc-scenario-btns button:active{transform:scale(0.97)}
.fc-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(240px,100%),1fr));gap:12px;margin-bottom:24px}
.fc-summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 22px;text-align:center}
.fc-summary-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);margin-bottom:6px}
.fc-summary-card .value{font-size:26px;font-weight:700;letter-spacing:-0.02em}
.fc-summary-card .sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.fc-summary-card.highlight{border-color:var(--accent)}
.fc-summary-card.highlight .value{color:var(--accent)}
.fc-asset-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
.fc-asset-row:last-child{border-bottom:none}
.fc-asset-name{width:140px;font-weight:600;flex-shrink:0}
.fc-asset-bar{flex:1;height:24px;background:var(--surface2);border-radius:3px;overflow:hidden;position:relative}
.fc-asset-bar-fill{height:100%;border-radius:3px;transition:width 400ms var(--ease)}
.fc-asset-vals{width:240px;flex-shrink:0;display:flex;gap:12px;justify-content:flex-end;font-variant-numeric:tabular-nums}
.fc-asset-vals span{min-width:80px;text-align:right}
@media(max-width:768px){
  .fc-asset-vals{width:auto;flex-direction:column;gap:2px;align-items:flex-end}
  .fc-asset-name{width:100px}
}

/* ── ALERTS STRIP ── */
.alerts-strip{flex-shrink:0;background:#1a0000;border-bottom:2px solid var(--red);padding:8px 20px;display:flex;align-items:center;gap:8px;overflow-x:auto;z-index:25;min-height:40px}
.alerts-strip.hidden{display:none}
.alert-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.alert-pill .close-pill{cursor:pointer;opacity:0.6;font-size:14px;line-height:1;margin-left:4px;transition:opacity 180ms}
.alert-pill .close-pill:hover{opacity:1}
.alerts-strip .mark-reviewed{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--text-muted);font:500 11px/1 'Inter',sans-serif;padding:5px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-left:auto;transition:all 180ms var(--ease)}
.alerts-strip .mark-reviewed:hover{background:rgba(255,255,255,0.12);color:var(--text)}

/* ── THESIS CARDS ── */
.thesis-section{margin-top:32px}
.thesis-controls{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.thesis-controls button{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font:500 12px/1 'Inter',sans-serif;padding:7px 14px;border-radius:var(--radius);cursor:pointer;transition:all 180ms var(--ease)}
.thesis-controls button:hover{border-color:var(--border-hover);color:var(--text)}
.thesis-card{background:#111;border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;transition:border-color 180ms var(--ease)}
.thesis-card:hover{border-color:var(--border-hover)}
.thesis-header{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;flex-wrap:wrap;user-select:none}
.thesis-header .ticker-tag{font-size:13px;font-weight:700;padding:3px 10px;border-radius:4px;background:rgba(255,255,255,0.08);color:var(--text);letter-spacing:0.02em}
.thesis-header .company-name{font-size:13px;color:var(--text-muted);flex:1;min-width:80px}
.thesis-header .conviction-dots{font-size:14px;letter-spacing:2px;margin-left:auto;flex-shrink:0}
.thesis-header .chevron{font-size:12px;color:var(--text-faint);transition:transform 200ms var(--ease);flex-shrink:0;margin-left:8px}
.thesis-card.open .thesis-header .chevron{transform:rotate(180deg)}
.thesis-body{display:none;padding:0 18px 18px;font-size:13px;line-height:1.65;color:var(--text-muted)}
.thesis-card.open .thesis-body{display:block}
.thesis-body .thesis-text{font-style:italic;color:var(--text);margin-bottom:14px;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:var(--radius);border-left:3px solid var(--accent)}
.thesis-body .drivers-list{list-style:none;margin-bottom:14px}
.thesis-body .drivers-list li{padding:4px 0;display:flex;align-items:flex-start;gap:8px}
.thesis-body .drivers-list li::before{content:"";flex-shrink:0}
.thesis-body .break-list{list-style:none;margin-bottom:14px}
.thesis-body .break-list li{padding:5px 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.thesis-body .break-toggle{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.thesis-body .break-toggle input{opacity:0;width:0;height:0}
.thesis-body .break-toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.1);border-radius:20px;transition:0.2s}
.thesis-body .break-toggle .slider::before{content:"";position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:var(--text-muted);border-radius:50%;transition:0.2s}
.thesis-body .break-toggle input:checked + .slider{background:var(--red)}
.thesis-body .break-toggle input:checked + .slider::before{transform:translateX(16px);background:#fff}
.thesis-body .fundamentals-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px}
@media(max-width:600px){.thesis-body .fundamentals-grid{grid-template-columns:1fr}}
.thesis-body .fund-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.thesis-body .fund-label{font-size:12px;color:var(--text-faint)}
.thesis-body .fund-val{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.thesis-body .fund-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:6px}
.fund-badge.cheap{background:var(--green-dim);color:var(--green)}
.fund-badge.fair{background:var(--amber-dim);color:var(--amber)}
.fund-badge.expensive{background:var(--red-dim);color:var(--red)}
.fund-badge.strong{background:var(--green-dim);color:var(--green)}
.fund-badge.weak{background:var(--amber-dim);color:var(--amber)}
.fund-badge.neg{background:var(--red-dim);color:var(--red)}
.fund-badge.clean{background:var(--green-dim);color:var(--green)}
.fund-badge.moderate{background:var(--amber-dim);color:var(--amber)}
.fund-badge.high-debt{background:var(--red-dim);color:var(--red)}
.fund-badge.upside{background:var(--green-dim);color:var(--green)}
.fund-badge.downside{background:var(--red-dim);color:var(--red)}
.thesis-body .sub-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);margin:14px 0 8px;padding-top:6px;border-top:1px solid var(--border)}
.thesis-body .sub-title:first-child{margin-top:0;border-top:none;padding-top:0}

/* ── EDIT MODAL ── */
.edit-fab{position:fixed;bottom:24px;right:24px;z-index:100;background:var(--accent);color:#fff;border:none;font:600 13px/1 'Inter',sans-serif;padding:12px 20px;border-radius:30px;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,0.4);transition:all 180ms var(--ease);display:flex;align-items:center;gap:8px}
.edit-fab:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(59,130,246,0.5)}
.edit-fab:active{transform:scale(0.97)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h2{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.modal-tabs{display:flex;gap:2px;padding:12px 24px 0;flex-shrink:0}
.modal-tabs button{background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font:500 13px/1 'Inter',sans-serif;padding:8px 16px;cursor:pointer;transition:all 180ms}
.modal-tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.modal-body{flex:1;overflow-y:auto;padding:16px 24px 24px}
.modal-body input,.modal-body select,.modal-body textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);font:13px/1.4 'Inter',sans-serif;padding:8px 12px;border-radius:var(--radius);width:100%;transition:border-color 180ms}
.modal-body input:focus,.modal-body select:focus,.modal-body textarea:focus{outline:none;border-color:var(--accent)}
.modal-body textarea{resize:vertical;min-height:80px}
.modal-body label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-faint);margin-bottom:4px;margin-top:12px}
.modal-body label:first-child{margin-top:0}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border);flex-shrink:0}
.modal-actions button{font:500 13px/1 'Inter',sans-serif;padding:9px 20px;border-radius:var(--radius);cursor:pointer;transition:all 180ms var(--ease);border:1px solid var(--border)}
.modal-actions .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-actions .btn-primary:hover{opacity:0.9}
.modal-actions .btn-secondary{background:var(--surface);color:var(--text-muted)}
.modal-actions .btn-secondary:hover{color:var(--text);border-color:var(--border-hover)}
.modal-edit-table{width:100%;font-size:13px;border-collapse:collapse}
.modal-edit-table th{text-align:left;padding:6px 8px;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-faint);border-bottom:1px solid var(--border)}
.modal-edit-table td{padding:4px 4px}
.modal-edit-table input{padding:6px 8px;font-size:13px}
.modal-edit-table .del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:4px 8px;opacity:0.6}
.modal-edit-table .del-btn:hover{opacity:1}
.export-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font:12px/1.5 monospace;color:var(--text-muted);max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all;user-select:all}
.export-note{font-size:12px;color:var(--text-faint);margin-top:12px;line-height:1.5;padding:10px;background:rgba(59,130,246,0.06);border-radius:var(--radius);border-left:3px solid var(--accent)}
.conviction-slider{display:flex;align-items:center;gap:12px;margin-top:4px}
.conviction-slider input[type=range]{flex:1;accent-color:var(--accent)}
.conviction-slider .conv-val{font-weight:700;font-size:16px;width:24px;text-align:center}

/* Animations */
@media(prefers-reduced-motion:no-preference){
  .tab.active{animation:fadeIn 200ms var(--ease)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
}

// ── ALERTS ENGINE ──
function computeAlerts() {
  const alerts = [];
  const total = getPortfolioTotal();
  PORTFOLIO_CONFIG.holdings.forEach(h => {
    const th = PORTFOLIO_CONFIG.theses[h.ticker];
    if (!th) return;
    // Price-based break conditions
    th.breakConditions.forEach((bc, idx) => {
      if (bc.type === 'price_below' && h.price < bc.value) {
        alerts.push({ ticker: h.ticker, label: bc.label, id: h.ticker + ':price:' + idx });
      }
      if (bc.type === 'price_above' && h.price > bc.value) {
        alerts.push({ ticker: h.ticker, label: bc.label, id: h.ticker + ':price:' + idx });
      }
      if (bc.type === 'manual' && manualBreaches[h.ticker + ':' + idx]) {
        alerts.push({ ticker: h.ticker, label: bc.label, id: h.ticker + ':manual:' + idx });
      }
    });
    // Concentration > 12%
    const w = getHoldingWeight(h);
    if (w > 12) {
      alerts.push({ ticker: h.ticker, label: `${w.toFixed(1)}% concentration (>12%)`, id: h.ticker + ':conc' });
    }
    // EXIT verdict still in portfolio
    if (th.verdict === 'EXIT') {
      alerts.push({ ticker: h.ticker, label: `Verdict is EXIT \u2014 consider selling`, id: h.ticker + ':exit' });
    }
  });
  return alerts.filter(a => !dismissedAlerts.has(a.id));
}

function renderAlerts() {
  const strip = document.getElementById('alertsStrip');
  const alerts = computeAlerts();
  if (alerts.length === 0) {
    strip.classList.add('hidden');
    strip.innerHTML = '';
    return;
  }
  strip.classList.remove('hidden');
  const pills = alerts.map(a =>
    `<span class="alert-pill">\u26A0 ${a.ticker}: ${a.label}<span class="close-pill" onclick="dismissAlert('${a.id}')">\u2715</span></span>`
  ).join('');
  strip.innerHTML = pills + `<button class="mark-reviewed" onclick="dismissAllAlerts()">MARK ALL REVIEWED</button>`;
  // Fire webhook for each un-dismissed alert
  alerts.forEach(a => {
    sendAlertWebhook({ ticker: a.ticker, type: 'thesis_break', message: a.label, id: a.id, timestamp: new Date().toISOString() });
  });
}

window.dismissAlert = function(id) {
  dismissedAlerts.add(id);
  renderAlerts();
};
window.dismissAllAlerts = function() {
  computeAlerts().forEach(a => dismissedAlerts.add(a.id));
  renderAlerts();
};
window.toggleManualBreach = function(ticker, idx) {
  const key = ticker + ':' + idx;
  if (manualBreaches[key]) delete manualBreaches[key];
  else manualBreaches[key] = true;
  renderAlerts();
  // Also re-render to update toggle state if on My Portfolio tab
  if (activeTab === 3) render();
};

    </div>`;
}

// ── MY PORTFOLIO (enhanced with thesis cards) ──
function renderMyPortfolio() {
  const totalVal = getPortfolioTotal();
  const nwPct = 34;
  const holdings = PORTFOLIO_CONFIG.holdings;
  const positions = holdings.length;

  // Sort by value desc
  const sorted = [...holdings].sort((a,b) => getHoldingValue(b) - getHoldingValue(a));

  // Weighted P/E
  const peHoldings = sorted.filter(h => {
    const th = PORTFOLIO_CONFIG.theses[h.ticker];
    return th && th.fundamentals.peRatio > 0;
  });
  const totalPeWeight = peHoldings.reduce((s,h) => s + getHoldingWeight(h), 0);
  const wPE = totalPeWeight > 0 ? peHoldings.reduce((s,h) => s + (PORTFOLIO_CONFIG.theses[h.ticker].fundamentals.peRatio) * getHoldingWeight(h), 0) / totalPeWeight : 0;

  // Quality score
  const qMap = {'STRONG BUY':5,'BUY':4,'HOLD':3,'TRIM':2,'EXIT':1};
  const avgQ = (sorted.reduce((s,h) => {
    const th = PORTFOLIO_CONFIG.theses[h.ticker];
    return s + (th ? (qMap[th.verdict]||3) : 3) * getHoldingWeight(h);
  }, 0) / 100).toFixed(1);

  const vBadge = v => `<span class="verdict-badge ${verdictBadgeClass(v)}">${v}</span>`;
  const sBadge = s => `<span class="sizing-badge ${sizingBadgeClass(s)}">${s}</span>`;

  const kpis = [
    ['Total Value','$'+Math.round(totalVal).toLocaleString()],
    ['% of Net Worth','~'+nwPct+'%'],
    ['Positions',positions],
    ['Wtd P/E','~'+Math.round(wPE)+'x'],
    ['Avg Quality',avgQ+' / 5'],
  ];

  // Category breakdown
  const cats = {};
  sorted.forEach(h => {
    if (!cats[h.category]) cats[h.category] = 0;
    cats[h.category] += getHoldingWeight(h);
  });
  const catColors = {'AI Platforms':'#3b82f6','AI Infrastructure':'#8b5cf6','Energy/Power':'#f59e0b','Commodities':'#22c55e'};
  const catBar = Object.entries(cats).map(([name, pctV]) =>
    `<div class="mp-cat-seg" style="flex:${pctV};background:${catColors[name]||'#666'}" title="${name}: ${pctV.toFixed(1)}%">${pctV.toFixed(0)}%</div>`
  ).join('');
  const catLegend = Object.entries(cats).map(([name, pctV]) =>
    `<span style="display:inline-flex;align-items:center;gap:4px;margin-right:16px;font-size:12px;color:var(--text-muted)"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${catColors[name]||'#666'}"></span>${name} (${pctV.toFixed(1)}%)</span>`
  ).join('');

  // Holdings table
  const rows = sorted.map(h => {
    const th = PORTFOLIO_CONFIG.theses[h.ticker];
    const w = getHoldingWeight(h);
    const v = getHoldingValue(h);
    const pe = th ? th.fundamentals.peRatio : 'N/A';
    const verdict = th ? th.verdict : 'N/A';
    const sizing = th ? th.sizing : 'N/A';
    const revG = th ? th.fundamentals.revenueGrowth : null;
    const om = th ? th.fundamentals.operatingMargin : null;
    const fcf = th ? th.fundamentals.fcfMargin : null;
    const fmtN = n => n === null ? '\u2014' : (n < 0 ? `<span class="negative">${n}%</span>` : n+'%');
    return `<tr>
      <td style="font-weight:600">${h.ticker}</td>
      <td class="tabular">${w.toFixed(1)}%</td>
      <td class="tabular">$${Math.round(v).toLocaleString()}</td>
      <td class="tabular" style="${pe < 0 ? 'color:var(--red)' : ''}">${pe}x</td>
      <td>${vBadge(verdict)}</td>
      <td>${sBadge(sizing)}</td>
      <td class="tabular">${fmtN(revG)}</td>
      <td class="tabular">${fmtN(om)}</td>
      <td class="tabular">${fmtN(fcf)}</td>
    </tr>`;
  }).join('');

  // Issues
  const issues = MP_ISSUES.map(i =>
    `<div class="alert-card"><span class="alert-sev ${i.sev}">${i.sev}</span><div><strong style="color:var(--text)">${i.title}</strong><br>${i.desc}</div></div>`
  ).join('');

  // Recs
  const iconMap = {trim:'\u2702',exit:'\u2716',hold:'\u2714',add:'\u002B'};
  const recs = MP_RECS.map(r =>
    `<div class="action-card"><div class="act-icon ${r.icon}">${iconMap[r.icon]}</div><div><div class="act-title">${r.title}</div><div class="act-desc">${r.desc}</div></div></div>`
  ).join('');

  // Scenario simulator
  const simReturns = {bull:[1.35,1.35,1.35],base:[1.15,1.15,1.15],bear:[0.80,1.05,1.05]};
  const simLabels = {bull:'Bull (+35%/yr)',base:'Base (+15%/yr)',bear:'Bear (-20% Y1, +5%/yr)'};
  const sr = simReturns[mpScenario];
  const y1 = totalVal * sr[0];
  const y3 = totalVal * sr[0] * sr[1] * sr[2];
  let y5 = totalVal;
  for(let i=0;i<5;i++) y5 *= (i<sr.length ? sr[i] : sr[sr.length-1]);
  const totalNW = 1100000;
  const nw1 = totalNW - totalVal + y1;
  const nw3 = totalNW - totalVal + y3;
  const nw5 = totalNW - totalVal + y5;
  const simBtns = Object.entries(simLabels).map(([k,v]) =>
    `<button class="${k===mpScenario?'active':''}" onclick="setMpScenario('${k}')">${v}</button>`
  ).join('');
  const fmtD = n => '$'+(n/1000).toFixed(0)+'K';
  const fmtNW = n => '$'+(n/1000000).toFixed(2)+'M';

  // ── THESIS CARDS ──
  const thesisCards = sorted.map(h => {
    const th = PORTFOLIO_CONFIG.theses[h.ticker];
    if (!th) return '';
    const isActionable = th.verdict === 'TRIM' || th.verdict === 'EXIT';
    const openClass = (allThesesExpanded || isActionable) ? 'open' : '';
    const borderColor = verdictColor(th.verdict);
    const dots = Array.from({length:5}, (_,i) => i < h.conviction ? '\u25CF' : '\u25CB').join('');
    const w = getHoldingWeight(h);

    // Fundamentals comparison badges
    const peBadge = th.fundamentals.peRatio < 0 ? '<span class="fund-badge neg">NEGATIVE</span>'
      : th.fundamentals.peRatio < 35 ? '<span class="fund-badge cheap">CHEAP</span>'
      : th.fundamentals.peRatio <= 60 ? '<span class="fund-badge fair">FAIR</span>'
      : '<span class="fund-badge expensive">EXPENSIVE</span>';
    const fcfBadge = th.fundamentals.fcfMargin < 0 ? '<span class="fund-badge neg">NEGATIVE</span>'
      : th.fundamentals.fcfMargin < 15 ? '<span class="fund-badge weak">WEAK</span>'
      : '<span class="fund-badge strong">STRONG</span>';
    const debtBadge = th.fundamentals.debtEbitda < 1 ? '<span class="fund-badge clean">CLEAN</span>'
      : th.fundamentals.debtEbitda <= 2.5 ? '<span class="fund-badge moderate">MODERATE</span>'
      : '<span class="fund-badge high-debt">HIGH</span>';
    const upside = ((th.fundamentals.analystTarget - h.price) / h.price * 100);
    const targetBadge = upside >= 0
      ? `<span class="fund-badge upside">+${upside.toFixed(0)}% upside</span>`
      : `<span class="fund-badge downside">${upside.toFixed(0)}% downside</span>`;

    const drivers = th.keyDrivers.map(d => `<li>\u2705 ${d}</li>`).join('');
    const breaks = th.breakConditions.map((bc, idx) => {
      const isBreached = bc.type === 'manual' ? !!manualBreaches[h.ticker + ':' + idx]
        : bc.type === 'price_below' ? h.price < bc.value
        : bc.type === 'price_above' ? h.price > bc.value
        : false;
      const toggleHTML = bc.type === 'manual'
        ? `<label class="break-toggle"><input type="checkbox" ${isBreached?'checked':''} onchange="toggleManualBreach('${h.ticker}',${idx})"><span class="slider"></span></label>`
        : (isBreached ? '<span style="color:var(--red);font-weight:600;font-size:11px">TRIGGERED</span>' : '<span style="color:var(--green);font-size:11px">OK</span>');
      return `<li>\ud83d\udd34 ${bc.label} ${toggleHTML}</li>`;
    }).join('');

    return `<div class="thesis-card ${openClass}" style="border-left:3px solid ${borderColor}" id="thesis-${h.ticker}">
      <div class="thesis-header" onclick="toggleThesis('${h.ticker}')">
        <span class="ticker-tag">${h.ticker}</span>
        <span class="company-name">${h.name} <span style="color:var(--text-faint);font-size:11px">${w.toFixed(1)}%</span></span>
        ${vBadge(th.verdict)} ${sBadge(th.sizing)}
        <span class="conviction-dots" style="color:${borderColor}">${dots}</span>
        <span class="chevron">\u25BC</span>
      </div>
      <div class="thesis-body">
        <div class="sub-title">Thesis</div>
        <div class="thesis-text">"${th.thesis}"</div>
        <div class="sub-title">Key Drivers (must remain true)</div>
        <ul class="drivers-list">${drivers}</ul>
        <div class="sub-title">Thesis Break Conditions</div>
        <ul class="break-list">${breaks}</ul>
        <div class="sub-title">Fundamentals</div>
        <div class="fundamentals-grid">
          <div class="fund-row"><span class="fund-label">P/E Ratio</span><span class="fund-val">${th.fundamentals.peRatio}x ${peBadge}</span></div>
          <div class="fund-row"><span class="fund-label">Revenue Growth</span><span class="fund-val">${th.fundamentals.revenueGrowth}%</span></div>
          <div class="fund-row"><span class="fund-label">FCF Margin</span><span class="fund-val">${th.fundamentals.fcfMargin}% ${fcfBadge}</span></div>
          <div class="fund-row"><span class="fund-label">Op. Margin</span><span class="fund-val">${th.fundamentals.operatingMargin}%</span></div>
          <div class="fund-row"><span class="fund-label">Debt/EBITDA</span><span class="fund-val">${th.fundamentals.debtEbitda}x ${debtBadge}</span></div>
          <div class="fund-row"><span class="fund-label">Analyst Target</span><span class="fund-val">$${th.fundamentals.analystTarget} ${targetBadge}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');

  const expandToggle = allThesesExpanded
    ? `<button onclick="collapseAllTheses()">Collapse All</button>`
    : `<button onclick="expandAllTheses()">Expand All</button>`;

  return `
    <div class="kpi-row">${kpis.map(k => `<div class="kpi"><div class="kpi-label">${k[0]}</div><div class="kpi-value tabular">${k[1]}</div></div>`).join('')}</div>
    <div class="mp-section-title">Category Breakdown</div>
    <div class="mp-cat-bar">${catBar}</div>
    <div style="margin-bottom:24px">${catLegend}</div>
    <div class="mp-section-title">Holdings</div>
    <div class="table-wrap" style="margin-bottom:24px"><table>
      <thead><tr><th>Ticker</th><th>Weight</th><th>Value</th><th>P/E</th><th>Verdict</th><th>Sizing</th><th>Rev Growth</th><th>Op Margin</th><th>FCF Margin</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="mp-section-title">Portfolio Issues</div>
    ${issues}
    <div class="mp-section-title">Recommendations</div>
    <div class="rec-grid">${recs}</div>
    <div class="mp-section-title">Scenario Simulator</div>
    <div class="mp-sim-controls"><div class="control-group"><label style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);margin-bottom:8px">Scenario</label><div class="btn-group">${simBtns}</div></div></div>
    <div class="mp-sim-grid">
      <div class="mp-sim-card"><div class="label">1-Year</div><div class="value tabular">${fmtD(y1)}</div><div class="sub">NW: ${fmtNW(nw1)}</div></div>
      <div class="mp-sim-card"><div class="label">3-Year</div><div class="value tabular">${fmtD(y3)}</div><div class="sub">NW: ${fmtNW(nw3)}</div></div>
      <div class="mp-sim-card"><div class="label">5-Year</div><div class="value tabular">${fmtD(y5)}</div><div class="sub">NW: ${fmtNW(nw5)}</div></div>
    </div>
    <div class="insight" style="margin-top:16px">Portfolio is $${Math.round(totalVal).toLocaleString()} (${nwPct}% of ~$1.1M NW). Projections assume non-stock assets grow at 5%/yr.</div>
    <div class="thesis-section">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;margin-top:32px;flex-wrap:wrap">
        <span class="mp-section-title" style="margin:0">\u2014 Thesis &amp; Fundamentals \u2014</span>
        <div class="thesis-controls">${expandToggle}</div>
      </div>
      ${thesisCards}
    </div>`;
}

window.toggleThesis = function(ticker) {
  const el = document.getElementById('thesis-' + ticker);
  if (el) el.classList.toggle('open');
};
window.expandAllTheses = function() {
  allThesesExpanded = true;
  document.querySelectorAll('.thesis-card').forEach(c => c.classList.add('open'));
  render();
};
window.collapseAllTheses = function() {
  allThesesExpanded = false;
  document.querySelectorAll('.thesis-card').forEach(c => c.classList.remove('open'));
  render();
};

}

// ── 10-YEAR FORECAST (unchanged) ──
function renderForecast() {
  const sc = FC_DATA[fcScenario];
  const f = sc.final;
  const startNW = 1350000;
  const medMultiple = (f.med / startNW).toFixed(1);
  const medCAGR = ((Math.pow(f.med / startNW, 1/10) - 1) * 100).toFixed(1);
  const fmtM = v => '$' + (v/1000000).toFixed(2) + 'M';
  const fmtK = v => '$' + Math.round(v/1000).toLocaleString() + 'K';
  const scenBtns = ['pw','bull','base','bear'].map(k => {
    const d = FC_DATA[k];
    return `<button class="${k===fcScenario?'active':''}" onclick="setFcScenario('${k}')">${d.label} <span style="opacity:0.5;font-size:11px">${d.prob}%</span></button>`;
  }).join('');
  const maxMed = Math.max(...sc.assets.map(a => a.med));
  const assetRows = sc.assets.map(a => {
    const barPct = Math.max(4, (a.med / maxMed * 100)).toFixed(0);
    const gain = a.med - a.start;
    const gainClass = gain >= 0 ? 'positive' : 'negative';
    return `<div class="fc-asset-row">
      <div class="fc-asset-name">${a.name}</div>
      <div class="fc-asset-bar"><div class="fc-asset-bar-fill" style="width:${barPct}%;background:${a.color}"></div></div>
      <div class="fc-asset-vals">
        <span style="color:var(--text-faint)">${fmtK(a.start)}</span>
        <span style="font-weight:600">${fmtK(a.med)}</span>
        <span class="${gainClass}">${a.cagr >= 0 ? '+' : ''}${a.cagr}%</span>
      </div>
    </div>`;
  }).join('');
  return `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Starting Net Worth</div><div class="kpi-value tabular">${fmtM(startNW)}</div></div>
      <div class="kpi"><div class="kpi-label">10Y Median</div><div class="kpi-value tabular" style="color:var(--accent)">${fmtM(f.med)}</div></div>
      <div class="kpi"><div class="kpi-label">Multiple</div><div class="kpi-value tabular">${medMultiple}x</div></div>
      <div class="kpi"><div class="kpi-label">CAGR</div><div class="kpi-value tabular">${medCAGR}%</div></div>
      <div class="kpi"><div class="kpi-label">Simulations</div><div class="kpi-value tabular">10,000</div></div>
    </div>
    <div class="fc-scenario-btns">${scenBtns}</div>
    <div class="scenario-note" style="margin-bottom:16px">${sc.desc}</div>
    <div class="fc-chart-wrap"><canvas id="fcChartCanvas"></canvas></div>
    <div class="fc-summary-grid">
      <div class="fc-summary-card"><div class="label">Downside (P10)</div><div class="value tabular negative">${fmtM(f.p10)}</div><div class="sub">${(f.p10/startNW).toFixed(1)}x on capital</div></div>
      <div class="fc-summary-card highlight"><div class="label">Median (P50)</div><div class="value tabular">${fmtM(f.med)}</div><div class="sub">${medMultiple}x on capital</div></div>
      <div class="fc-summary-card"><div class="label">Upside (P90)</div><div class="value tabular positive">${fmtM(f.p90)}</div><div class="sub">${(f.p90/startNW).toFixed(1)}x on capital</div></div>
    </div>
    <div class="mp-section-title">Asset Class Breakdown (10Y Median)</div>
    <div style="font-size:11px;color:var(--text-faint);margin-bottom:12px;display:flex;justify-content:flex-end;gap:12px;padding-right:8px">
      <span>Start</span><span style="min-width:80px;text-align:right">10Y Value</span><span style="min-width:48px;text-align:right">CAGR</span>
    </div>
    <div class="table-wrap" style="border:none;background:transparent">${assetRows}</div>
    <div class="insight" style="margin-top:20px">
      10,000 Monte Carlo simulations per scenario using log-normal returns. Return assumptions based on Goldman Sachs (S&P 6.5%/yr), ARK/VanEck (BTC $300\u2013600K by 2030\u201335), VanEck (gold $5K+), and Cyprus real estate forecasts (5\u20138%/yr). Volatility calibrated to historical asset class behaviour. This is not financial advice.
    </div>`;
}

function initFcChart() {
  const canvas = document.getElementById('fcChartCanvas');
  if (!canvas || typeof Chart === 'undefined') return;
  const sc = FC_DATA[fcScenario];
  const years = sc.yearly.map(y => 2026 + y.y);
  const medians = sc.yearly.map(y => y.med);
  const p10s = sc.yearly.map(y => y.p10);
  const p90s = sc.yearly.map(y => y.p90);
  if (fcChart) fcChart.destroy();
  fcChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: years,
      datasets: [
        {label:'P90 (Upside)',data:p90s,borderColor:'rgba(34,197,94,0.5)',backgroundColor:'rgba(34,197,94,0.06)',fill:'+1',borderWidth:1.5,borderDash:[4,4],pointRadius:0,pointHoverRadius:4,tension:0.3},
        {label:'Median (P50)',data:medians,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.08)',fill:'+1',borderWidth:2.5,pointRadius:3,pointBackgroundColor:'#3b82f6',pointHoverRadius:5,tension:0.3},
        {label:'P10 (Downside)',data:p10s,borderColor:'rgba(239,68,68,0.5)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,4],pointRadius:0,pointHoverRadius:4,tension:0.3},
      ]
    },
    options: {
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#a0a0a0',font:{family:'Inter',size:12},usePointStyle:true,pointStyle:'line',padding:16}},
        tooltip:{backgroundColor:'#1a1a1a',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#e5e5e5',bodyColor:'#a0a0a0',padding:12,callbacks:{label:ctx=>{const v=ctx.parsed.y;return ctx.dataset.label+': $'+(v/1000000).toFixed(2)+'M';}}}
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#666',font:{family:'Inter',size:11}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#666',font:{family:'Inter',size:11},callback:v=>'$'+(v/1000000).toFixed(1)+'M'}}
      }
    }
  });
}

// ── RENDER PIPELINE ──
const RENDERERS = [renderUniverse, renderBacktests, renderScenarios, renderMyPortfolio, renderPortfolio, renderExitRules, renderForecast];

function render() {
  const main = $('#main');
  main.innerHTML = TABS.map((t,i) => `<section class="tab${i===activeTab?' active':''}" id="tab-${i}"></section>`).join('');
  $(`#tab-${activeTab}`).innerHTML = RENDERERS[activeTab]();
  if (activeTab === 4) initDonut();
  if (activeTab === 6) initFcChart();
  renderAlerts();
}

function initDonut() {
  const canvas = $('#donutCanvas');
  if (!canvas || typeof Chart === 'undefined') return;
  const p = PORTFOLIOS[activeProfile];
  const aiTotal = p.ai.reduce((s,r) => s + r[1], 0);
  const coreTotal = p.core.reduce((s,r) => s + r[1], 0);
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(canvas, {
    type:'doughnut',
    data:{labels:['AI Sleeve','Core'],datasets:[{data:[aiTotal,coreTotal],backgroundColor:['#3b82f6','#444'],borderWidth:0,borderRadius:3}]},
    options:{cutout:'68%',plugins:{legend:{display:false},tooltip:{enabled:true}},responsive:false,animation:{animateRotate:true,duration:500}}
  });
}

// ── GLOBAL HANDLERS ──
window.setScenario = k => { activeScenario = k; render(); };
window.setAlloc = i => { activeAlloc = i; render(); };
window.setProfile = k => { activeProfile = k; render(); };
window.setMpScenario = k => { mpScenario = k; render(); };
window.setFcScenario = k => { fcScenario = k; render(); };

// ── EDIT MODAL ──
window.openEditModal = function() {
  document.getElementById('editModal').classList.add('open');
  modalTab = 'holdings';
  renderModal();
};
window.closeEditModal = function() {
  document.getElementById('editModal').classList.remove('open');
};

function renderModal() {
  const tabs = document.getElementById('modalTabs');
  tabs.innerHTML = ['holdings','theses','export'].map(t =>
    `<button class="${t===modalTab?'active':''}" onclick="setModalTab('${t}')">${t==='holdings'?'Holdings':t==='theses'?'Theses':'\ud83d\udccb Export Config'}</button>`
  ).join('');
  const body = document.getElementById('modalBody');
  const actions = document.getElementById('modalActions');
  if (modalTab === 'holdings') {
    renderHoldingsModal(body, actions);
  } else if (modalTab === 'theses') {
    renderThesesModal(body, actions);
  } else {
    renderExportModal(body, actions);
  }
}

window.setModalTab = function(t) { modalTab = t; renderModal(); };

function renderHoldingsModal(body, actions) {
  const h = PORTFOLIO_CONFIG.holdings;
  let tableRows = h.map((row, i) => `<tr>
    <td><input value="${row.ticker}" onchange="updateHolding(${i},'ticker',this.value)" style="width:60px"></td>
    <td><input value="${row.name}" onchange="updateHolding(${i},'name',this.value)" style="width:120px"></td>
    <td><input type="number" step="0.01" value="${row.shares}" onchange="updateHolding(${i},'shares',parseFloat(this.value)||0)" style="width:80px"></td>
    <td><input type="number" step="0.01" value="${row.price}" onchange="updateHolding(${i},'price',parseFloat(this.value)||0)" style="width:90px"></td>
    <td><button class="del-btn" onclick="deleteHolding(${i})">\u2716</button></td>
  </tr>`).join('');
  body.innerHTML = `<table class="modal-edit-table">
    <thead><tr><th>Ticker</th><th>Name</th><th>Shares</th><th>Price</th><th></th></tr></thead>
    <tbody>${tableRows}</tbody>
  </table>
  <button style="margin-top:12px;background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);font:500 12px/1 'Inter',sans-serif;padding:8px 16px;border-radius:var(--radius);cursor:pointer" onclick="addHolding()">+ Add Position</button>`;
  actions.innerHTML = `<button class="btn-secondary" onclick="closeEditModal()">Cancel</button><button class="btn-primary" onclick="saveHoldingsAndClose()">Save Changes</button>`;
}

window.updateHolding = function(i, field, val) { PORTFOLIO_CONFIG.holdings[i][field] = val; };
window.deleteHolding = function(i) { PORTFOLIO_CONFIG.holdings.splice(i, 1); renderModal(); };
window.addHolding = function() {
  PORTFOLIO_CONFIG.holdings.push({ ticker:'NEW', name:'New Position', shares:0, price:0, category:'AI Infrastructure', conviction:3 });
  renderModal();
};
window.saveHoldingsAndClose = function() { render(); closeEditModal(); };

function renderThesesModal(body, actions) {
  const tickers = PORTFOLIO_CONFIG.holdings.map(h => h.ticker);
  const selected = tickers[0] || '';
  body.innerHTML = `<label>Select Ticker</label>
    <select id="thesisTickerSelect" onchange="renderThesisEdit()">
      ${tickers.map(t => `<option value="${t}">${t}</option>`).join('')}
    </select>
    <div id="thesisEditArea"></div>`;
  actions.innerHTML = `<button class="btn-secondary" onclick="closeEditModal()">Cancel</button><button class="btn-primary" onclick="saveThesisAndClose()">Save Changes</button>`;
  setTimeout(renderThesisEdit, 0);
}

window.renderThesisEdit = function() {
  const ticker = document.getElementById('thesisTickerSelect').value;
  const th = PORTFOLIO_CONFIG.theses[ticker];
  const area = document.getElementById('thesisEditArea');
  if (!th) { area.innerHTML = '<p style="color:var(--text-faint);margin-top:12px">No thesis data for this ticker.</p>'; return; }
  const h = PORTFOLIO_CONFIG.holdings.find(x => x.ticker === ticker);
  area.innerHTML = `
    <label>Thesis</label>
    <textarea id="thesisText">${th.thesis}</textarea>
    <label>Conviction (1\u20135)</label>
    <div class="conviction-slider">
      <input type="range" min="1" max="5" value="${h ? h.conviction : 3}" id="convSlider" oninput="document.getElementById('convVal').textContent=this.value">
      <span class="conv-val" id="convVal">${h ? h.conviction : 3}</span>
    </div>
    <label>Verdict</label>
    <select id="verdictSelect">
      ${['STRONG BUY','BUY','HOLD','TRIM','EXIT'].map(v => `<option value="${v}" ${v===th.verdict?'selected':''}>${v}</option>`).join('')}
    </select>
    <label>Sizing</label>
    <select id="sizingSelect">
      ${['UNDERWEIGHT','CORRECT','OVERWEIGHT'].map(s => `<option value="${s}" ${s===th.sizing?'selected':''}>${s}</option>`).join('')}
    </select>`;
};

window.saveThesisAndClose = function() {
  const ticker = document.getElementById('thesisTickerSelect').value;
  const th = PORTFOLIO_CONFIG.theses[ticker];
  if (th) {
    const textEl = document.getElementById('thesisText');
    if (textEl) th.thesis = textEl.value;
    const convEl = document.getElementById('convSlider');
    if (convEl) {
      const h = PORTFOLIO_CONFIG.holdings.find(x => x.ticker === ticker);
      if (h) h.conviction = parseInt(convEl.value);
    }
    const vEl = document.getElementById('verdictSelect');
    if (vEl) th.verdict = vEl.value;
    const sEl = document.getElementById('sizingSelect');
    if (sEl) th.sizing = sEl.value;
  }
  render();
  closeEditModal();
};

function renderExportModal(body, actions) {
  const json = JSON.stringify(PORTFOLIO_CONFIG, null, 2);
  body.innerHTML = `<div class="export-box">${escapeHTML(json)}</div>
    <div class="export-note">To make changes permanent: copy the JSON above, open this HTML file in a text editor, find the <code>PORTFOLIO_CONFIG</code> block near the top of the &lt;script&gt; section, and replace it with your updated JSON. No coding required \u2014 just copy-paste.</div>`;
  actions.innerHTML = `<button class="btn-secondary" onclick="closeEditModal()">Close</button><button class="btn-primary" onclick="copyExport()">Copy to Clipboard</button>`;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.copyExport = function() {
  const json = JSON.stringify(PORTFOLIO_CONFIG, null, 2);
  navigator.clipboard.writeText('const PORTFOLIO_CONFIG = ' + json + ';').then(() => {
    const btn = document.querySelector('.modal-actions .btn-primary');
    if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000); }
  }).catch(() => {
    // Fallback: select the text
    const box = document.querySelector('.export-box');
    if (box) { const range = document.createRange(); range.selectNodeContents(box); const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); }
  });
};

// ── INIT ──
function init() {
  const nav = $('#nav');
  nav.innerHTML = TABS.map((t,i) => `<button class="${i===0?'active':''}" onclick="switchTab(${i})">${t}</button>`).join('');
  render();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
</body>
</html>
